dataset:
  # Dataset small matrix usado para simular interacción online
  events_path: ../data/processed/big_small_kuairec_20260311_100231/events_with_split.parquet
  
  # Estadísticas de normalización del dataset con el que fueron
  # entrenados los agentes offline (normalmente big matrix)
  normalization_stats: ../data/processed/big_small_kuairec_20260311_100231/normalization_stats.npz


simulator:
  # Checkpoint del GRU entrenado sobre small matrix
  # IMPORTANTE: debe incluir encoder_state_dict y head_state_dict
  gru_checkpoint: ../data/processed/big_small_kuairec_20260311_100231/gru_encoder.pt

  # Temperatura del simulador de usuario:
  # <1.0 = usuario más determinista
  # >1.0 = usuario más estocástico
  temperature: 1.0


agents:
  - name: bc
    type: bc
    checkpoint: ../runs/bc_discrete_bigmatrix_839789_20260306_083247/bc_candidate.pt

  - name: iql_policy
    type: iql_policy
    checkpoint: ../runs/iql_discrete_policy_bigmatrix_358270_20260306_134409/iql_policy.pt

  - name: iql_critic
    type: iql_critic
    checkpoint: ../runs/iql_discrete_bigmatrix_252894_20260306_102617/iql_stable.pt

  - name: cql
    type: cql
    checkpoint: ../runs/cql_discrete_stable_bigmatrix_382234_20260310_192330/cql_discrete_stable.pt


simulation:
  # split del small matrix sobre el que se simula
  split: test

  # número de items reales usados para inicializar el estado del usuario
  warmup_length: 5

  # número de pasos simulados por usuario
  horizon: 10

  # semilla para que todos los agentes se comparen bajo la misma
  # aleatoriedad del simulador
  seed: 42


output:
  # archivo JSON final con resultados de todos los agentes
  results_path: ../experiments/kuairec_02/simulate_online_results.json