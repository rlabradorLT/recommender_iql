# ============================================================
# Run
# ============================================================
experiment_name: "iql_discrete_faithful"
output_root: "./runs"
seed: 0

# ============================================================
# Data (npz expected keys:
# observations, next_observations, actions, rewards, terminals
# and optionally num_items (recommended)
# ============================================================
train_npz: "./data/train.npz"

# ============================================================
# IQL algorithm
# ============================================================
gamma: 0.99
expectile: 0.7
tau_polyak: 0.005

# ============================================================
# Critic/Value training
# ============================================================
critic_epochs: 100
batch_size: 4096
lr_q: 0.0003
lr_v: 0.0003
weight_decay: 0.0
grad_clip_norm: 10.0

# ============================================================
# Networks
# ============================================================
emb_dim: 64
hidden1: 256
hidden2: 256

# ============================================================
# Policy extraction (AWBC como en IQL)
# weights = exp(beta * (minQ - V))
# ============================================================
train_policy: true
policy_epochs: 50
lr_pi: 0.0003
beta: 3.0
max_weight: 100.0
policy_grad_clip: 10.0

# ============================================================
# Optional stabilizers (set null for faithful-by-default)
# If you want: clamp_adv_min: -20.0, clamp_adv_max: 20.0
# ============================================================
clamp_adv_min: null
clamp_adv_max: null

# ============================================================
# Logging
# ============================================================
log_every_epochs: 1