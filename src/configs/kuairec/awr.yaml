experiment_name: awr_small_matrix_kuairec

train_npz: ../data/processed/small_matrix_kuairec_20260304_190839/rl_train.npz
iql_ckpt: ../runs/iql_small_matrix_kuairec_580073_20260304_203811/iql_checkpoint.pt
# checkpoint del IQL usado para calcular ventajas

output_root: ../runs


# ==============================
# AWR PARAMETERS
# ==============================

beta: 1.0
# temperatura de la ponderación exponencial
# controla cuánto priorizar acciones con mayor ventaja

max_weight: 20.0
# clipping de pesos para evitar inestabilidad


# ==============================
# TRAINING
# ==============================

epochs: 5
batch_size: 4096
lr: 0.0003

grad_clip: 10.0


# ==============================
# NETWORK
# ==============================

emb_dim: 64