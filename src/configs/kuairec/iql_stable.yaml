# ============================================================
# Run
# ============================================================
experiment_name: "iql_discrete_faithful"
output_root: "../runs"
seed: 0

# ============================================================
# Data (npz expected keys:
# observations, next_observations, actions, rewards, terminals
# and optionally num_items (recommended)
# ============================================================
train_npz: "../data/processed/small_matrix_kuairec_20260304_190839/rl_train.npz"

# Reward scaling (clave en recsys)
reward_scale: 0.1

# IQL core
gamma: 0.95
expectile: 0.7

# Training
epochs: 20
batch_size: 4096

# IMPORTANT: bajar LR para evitar blow-up en bootstrapping
lr_q: 0.0001
lr_v: 0.0001
weight_decay: 0.0

# IMPORTANT: clip gradients
grad_clip_norm: 5.0

# Target networks: SLOW + PERIODIC
tau_polyak: 0.002
target_update_period: 25   # update targets cada 50 steps

# Model
hidden1: 512
hidden2: 512

# Robust loss for Q
huber_delta: 1.0

# Optional clamps (te ayudan MUCHO en KuaiRec)
clamp_v_min: null
clamp_v_max: null
clamp_adv_min: -10.0
clamp_adv_max: 10.0

log_every_epochs: 1