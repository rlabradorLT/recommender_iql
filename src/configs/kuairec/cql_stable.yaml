# ============================================================
# Run
# ============================================================
experiment_name: "cql_discrete_stable"
output_root: "../runs"
seed: 0

# ============================================================
# Data
# ============================================================
train_npz: "../data/processed/small_matrix_kuairec_20260304_190839/rl_train.npz"

reward_scale: 0.1

# ============================================================
# RL core
# ============================================================
gamma: 0.95

# ============================================================
# CQL parameters
# ============================================================

# conservative penalty strength
alpha_cql: 1.0

# temperature for logsumexp
cql_temperature: 1.0

# variant
cql_variant: "H"

# optional lagrange tuning (OFF = más estable)
use_lagrange: false
target_action_gap: 5.0
lr_alpha: 0.0003
alpha_min: 0.0001
alpha_max: 100.0

# ============================================================
# Training
# ============================================================
epochs: 20
batch_size: 4096

# IMPORTANT: LR bajo (como en IQL)
lr_q: 0.0001

weight_decay: 0.0
grad_clip_norm: 5.0

# ============================================================
# Target networks
# ============================================================

tau_polyak: 0.002
target_update_period: 25

# ============================================================
# Model
# ============================================================

hidden1: 512
hidden2: 512

# ============================================================
# Robust TD
# ============================================================

huber_delta: 1.0

# Optional clamp
max_q_abs: null

log_every_epochs: 1